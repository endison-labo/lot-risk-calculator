<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ロット計算（TRA / ゴールド目安）</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0d1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ロット計算" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --ok: #3fb950;
      --err: #f85149;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 16px;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 4px;
    }
    h1 { font-size: 1.15rem; margin: 0; font-weight: 700; flex: 1; min-width: 0; }
    .icon-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: #21262d;
      border: 1px solid var(--border);
      color: var(--accent);
      text-decoration: none;
    }
    .icon-btn svg { width: 22px; height: 22px; fill: currentColor; }
    .sub { color: var(--muted); font-size: 0.8rem; margin: 0 0 10px; }
    .k-strip {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 16px;
      padding: 8px 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }
    .k-strip .kval { color: var(--ok); font-weight: 600; }
    .k-strip a { color: var(--accent); font-size: 0.75rem; white-space: nowrap; }
    section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    h2 { font-size: 0.95rem; margin: 0 0 12px; color: var(--accent); font-weight: 600; }
    label { display: block; font-size: 0.75rem; color: var(--muted); margin-top: 10px; }
    label:first-of-type { margin-top: 0; }
    input {
      width: 100%;
      margin-top: 4px;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
    }
    button {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #21262d;
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    button.primary { background: var(--accent); border-color: var(--accent); color: #0d1117; }
    .msg { margin-top: 10px; font-size: 0.85rem; }
    .msg.ok { color: var(--ok); }
    .msg.err { color: var(--err); }
    .result { margin-top: 12px; padding: 10px; background: var(--bg); border-radius: 6px; font-size: 0.95rem; }
    footer { color: var(--muted); font-size: 0.7rem; margin-top: 24px; }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="header-row">
    <h1>ロット計算</h1>
    <a href="setup.html" class="icon-btn" aria-label="初期設定（係数 k）" title="初期設定">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
    </a>
  </div>
  <p class="sub">残高・リスク%・SL（ドル）から推奨ロット。係数 k は⚙で設定。</p>

  <div class="k-strip">
    <span>保存済み k: <span class="kval" id="kValShort">—</span></span>
    <a href="setup.html">変更する</a>
  </div>

  <section>
    <h2>推奨ロット</h2>
    <label>残高（円）</label>
    <input type="number" id="balance" step="1000" min="0" placeholder="200000" />
    <label>リスク %（例: 6）</label>
    <input type="number" id="riskPct" step="0.1" min="0" value="6" />
    <label>SL 幅（ドル）</label>
    <input type="number" id="slDollars" step="0.1" min="0" value="4" />
    <label>ロット刻み（切り下げ）</label>
    <input type="number" id="lotStep" step="0.01" min="0.01" value="0.01" />
    <button type="button" class="primary" id="btnCalc">計算</button>
    <div id="calcMsg" class="msg"></div>
    <div class="result" id="calcResult"></div>
  </section>

  <footer>
    教育・目安用。発注前は口座・ブローカーで確認してください。
  </footer>

  <script>
    const LS_KEY = 'tra.lotRisk.coefficientK';

    function loadK() {
      const v = parseFloat(localStorage.getItem(LS_KEY) || '', 10);
      return v > 0 && Number.isFinite(v) ? v : null;
    }

    function refreshKShort() {
      const k = loadK();
      const el = document.getElementById('kValShort');
      el.textContent = k != null ? k.toFixed(2) + ' 円/(L·$)' : '未設定';
      if (k == null) el.classList.remove('kval');
      else el.classList.add('kval');
    }

    document.getElementById('btnCalc').addEventListener('click', () => {
      const msg = document.getElementById('calcMsg');
      const out = document.getElementById('calcResult');
      msg.textContent = '';
      msg.className = 'msg';
      out.textContent = '';

      const k = loadK();
      if (k == null) {
        msg.innerHTML = '係数 k が未設定です。右上⚙の<strong>初期設定</strong>で保存してください。';
        msg.classList.add('err');
        return;
      }
      const balance = parseFloat(document.getElementById('balance').value, 10);
      const riskPct = parseFloat(document.getElementById('riskPct').value, 10);
      const sl = parseFloat(document.getElementById('slDollars').value, 10);
      const step = parseFloat(document.getElementById('lotStep').value, 10) || 0.01;
      if (!(balance > 0) || !(riskPct > 0) || !(sl > 0)) {
        msg.textContent = '残高・リスク%・SLドルを正しく入力してください。';
        msg.classList.add('err');
        return;
      }
      const riskAmount = balance * (riskPct / 100);
      const lotRaw = riskAmount / (k * sl);
      const lotFloor = Math.floor(lotRaw / step) * step;
      const ep = step.toString().includes('.') ? step.toString().split('.')[1].length : 0;
      out.innerHTML =
        '許容損失（目安）: <strong>' +
        riskAmount.toFixed(0) +
        '</strong> 円<br/>' +
        '理論ロット: <strong>' +
        lotRaw.toFixed(4) +
        '</strong><br/>' +
        '刻み切り下げ: <strong>' +
        lotFloor.toFixed(ep) +
        '</strong> ロット';
    });

    refreshKShort();
    window.addEventListener('pageshow', refreshKShort);

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function () {});
    }
  </script>
</body>
</html>
