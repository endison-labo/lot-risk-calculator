<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ロット計算（TRA / ゴールド目安）</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0d1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ロット計算" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --ok: #3fb950;
      --err: #f85149;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 16px;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }
    h1 { font-size: 1.15rem; margin: 0 0 4px; font-weight: 700; }
    .sub { color: var(--muted); font-size: 0.8rem; margin-bottom: 20px; }
    section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    h2 { font-size: 0.95rem; margin: 0 0 12px; color: var(--accent); font-weight: 600; }
    label { display: block; font-size: 0.75rem; color: var(--muted); margin-top: 10px; }
    label:first-of-type { margin-top: 0; }
    input {
      width: 100%;
      margin-top: 4px;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
    }
    .row { display: flex; gap: 8px; }
    .row input { flex: 1; }
    button {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #21262d;
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    button.primary { background: var(--accent); border-color: var(--accent); color: #0d1117; }
    button.danger { background: transparent; color: var(--err); border-color: var(--err); margin-top: 8px; }
    .msg { margin-top: 10px; font-size: 0.85rem; }
    .msg.ok { color: var(--ok); }
    .msg.err { color: var(--err); }
    .result { margin-top: 12px; padding: 10px; background: var(--bg); border-radius: 6px; font-size: 0.95rem; }
    .kval { color: var(--ok); font-weight: 700; }
    footer { color: var(--muted); font-size: 0.7rem; margin-top: 24px; }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <h1>ロット計算</h1>
  <p class="sub">係数 k を1回セット → 残高・リスク%・SL（ドル）から推奨ロット（ブラウザに保存）</p>

  <section>
    <h2>1. 係数 k（キャリブレーション）</h2>
    <p class="sub" style="margin-bottom:10px">実トレード1件: k = |損益円| ÷ (ロット × 価格の動きドル)</p>
    <label>ロット</label>
    <input type="number" id="calLot" step="0.01" min="0" placeholder="0.11" />
    <label>損益（円）※プラマイどちらでも可</label>
    <input type="number" id="calPnl" step="1" placeholder="-7500" />
    <label>値幅（ドル）— 直接</label>
    <input type="number" id="calWidth" step="0.01" min="0" placeholder="4" />
    <p class="sub" style="margin:10px 0 0;">または 建値・決済値（|終−始| をドル幅に）</p>
    <div class="row">
      <div style="flex:1">
        <label>建値</label>
        <input type="number" id="calEntry" step="0.01" placeholder="2650.5" />
      </div>
      <div style="flex:1">
        <label>決済値</label>
        <input type="number" id="calExit" step="0.01" placeholder="2646.5" />
      </div>
    </div>
    <button type="button" class="primary" id="btnCal">係数 k を保存</button>
    <button type="button" class="danger" id="btnClear">k をクリア</button>
    <div id="calMsg" class="msg"></div>
    <div class="result" id="kDisplay">保存済み k: <span class="kval" id="kVal">—</span></div>
  </section>

  <section>
    <h2>2. 推奨ロット</h2>
    <label>残高（円）</label>
    <input type="number" id="balance" step="1000" min="0" placeholder="200000" />
    <label>リスク %（例: TRA 6）</label>
    <input type="number" id="riskPct" step="0.1" min="0" value="6" />
    <label>SL 幅（ドル）</label>
    <input type="number" id="slDollars" step="0.1" min="0" value="4" />
    <label>ロット刻み（切り下げ）</label>
    <input type="number" id="lotStep" step="0.01" min="0.01" value="0.01" />
    <button type="button" class="primary" id="btnCalc">計算</button>
    <div id="calcMsg" class="msg"></div>
    <div class="result" id="calcResult"></div>
  </section>

  <footer>
    教育・目安用。発注前は口座・ブローカーで確認してください。
    <br />HTTPS でホストすると PWA としてホーム画面に追加可（README 参照）。
  </footer>

  <script>
    const LS_KEY = 'tra.lotRisk.coefficientK';

    function loadK() {
      const v = parseFloat(localStorage.getItem(LS_KEY) || '', 10);
      return v > 0 && Number.isFinite(v) ? v : null;
    }

    function saveK(k) {
      localStorage.setItem(LS_KEY, String(k));
    }

    function clearK() {
      localStorage.removeItem(LS_KEY);
    }

    function refreshKDisplay() {
      const k = loadK();
      document.getElementById('kVal').textContent = k != null ? k.toFixed(2) + ' 円/(ロット·ドル)' : '—（未設定）';
    }

    function dollarWidthFromPrices() {
      const a = parseFloat(document.getElementById('calEntry').value, 10);
      const b = parseFloat(document.getElementById('calExit').value, 10);
      if (!Number.isFinite(a) || !Number.isFinite(b)) return null;
      return Math.abs(b - a);
    }

    document.getElementById('btnCal').addEventListener('click', () => {
      const msg = document.getElementById('calMsg');
      msg.textContent = '';
      msg.className = 'msg';

      let lot = parseFloat(document.getElementById('calLot').value, 10);
      let pnl = parseFloat(document.getElementById('calPnl').value, 10);
      let w = parseFloat(document.getElementById('calWidth').value, 10);
      const wp = dollarWidthFromPrices();
      if (Number.isFinite(wp) && wp > 0) w = wp;
      if (!(lot > 0) || !(w > 0)) {
        msg.textContent = 'ロットと値幅（ドル）を入力するか、建値・決済値を入れてください。';
        msg.classList.add('err');
        return;
      }
      if (!Number.isFinite(pnl)) {
        msg.textContent = '損益（円）を入力してください。';
        msg.classList.add('err');
        return;
      }
      const k = Math.abs(pnl) / (lot * w);
      if (!(k > 0) || !Number.isFinite(k)) {
        msg.textContent = '係数を計算できませんでした。';
        msg.classList.add('err');
        return;
      }
      saveK(k);
      msg.textContent = '保存しました。';
      msg.classList.add('ok');
      refreshKDisplay();
    });

    document.getElementById('btnClear').addEventListener('click', () => {
      clearK();
      document.getElementById('calMsg').textContent = 'k を削除しました。';
      document.getElementById('calMsg').className = 'msg ok';
      refreshKDisplay();
    });

    document.getElementById('btnCalc').addEventListener('click', () => {
      const msg = document.getElementById('calcMsg');
      const out = document.getElementById('calcResult');
      msg.textContent = '';
      msg.className = 'msg';
      out.textContent = '';

      const k = loadK();
      if (k == null) {
        msg.textContent = '先に係数 k を保存してください。';
        msg.classList.add('err');
        return;
      }
      const balance = parseFloat(document.getElementById('balance').value, 10);
      const riskPct = parseFloat(document.getElementById('riskPct').value, 10);
      const sl = parseFloat(document.getElementById('slDollars').value, 10);
      const step = parseFloat(document.getElementById('lotStep').value, 10) || 0.01;
      if (!(balance > 0) || !(riskPct > 0) || !(sl > 0)) {
        msg.textContent = '残高・リスク%・SLドルを正しく入力してください。';
        msg.classList.add('err');
        return;
      }
      const riskAmount = balance * (riskPct / 100);
      const lotRaw = riskAmount / (k * sl);
      const lotFloor = Math.floor(lotRaw / step) * step;
      const ep = step.toString().includes('.') ? step.toString().split('.')[1].length : 0;
      out.innerHTML =
        '許容損失（目安）: <strong>' +
        riskAmount.toFixed(0) +
        '</strong> 円<br/>' +
        '理論ロット: <strong>' +
        lotRaw.toFixed(4) +
        '</strong><br/>' +
        '刻み切り下げ: <strong>' +
        lotFloor.toFixed(ep) +
        '</strong> ロット';
    });

    refreshKDisplay();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function () {});
    }
  </script>
</body>
</html>
